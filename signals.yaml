# Signal registry — THE admission-test config (product doc §11, build plan Phase 0).
# A signal enters the machine only if ALL five admission questions pass:
#   1. a number, not a vibe          → it is a numeric series stored in observations
#   2. free + fixed schedule         → source_url + schedule fields
#   3. 10+ years of history          → history_start (validated vs the run date)
#   4. one-sentence causal story     → causal_sentence
#   5. named elite watchers          → elite_watcher
# Groups (product doc §11): A positioning, B smart-money paperwork, C regulatory,
# D physical world, E company behavior, F market vital signs, G retail, H elite liquidity.
# pub_lag_days encodes the publication lag (as-of discipline; used by the Phase 5 replay).
# Validated by src/registry.py; mirrored into the signals.db `series` table each run.

signals:
  - series_id: net_liquidity
    name: Net liquidity (Fed balance sheet - Treasury account - reverse repo)
    group: H
    source: FRED
    source_url: https://fred.stlouisfed.org/graph/fredgraph.csv?id=WALCL  # derived with WTREGEN and RRPONTSYD
    schedule: weekly
    pub_lag_days: 1
    history_start: 2015-01-01
    window: rolling10y
    series_codes: [WALCL, WTREGEN, RRPONTSYD]
    causal_sentence: Central banks control the water level of the market pool, so rising net liquidity lifts asset prices before the crowd notices the tide.
    elite_watcher: Michael Howell (CrossBorder Capital), Stanley Druckenmiller, Michael Hartnett (BofA)

  - series_id: cot_managed_money
    name: CFTC COT Managed Money net positioning (gold, WTI, 10-yr T-note, EUR, corn)
    group: A
    source: CFTC
    source_url: https://www.cftc.gov/dea/newcot/f_disagg.txt
    schedule: weekly
    pub_lag_days: 3  # Tuesday data, Friday release
    history_start: 2006-06-13
    window: rolling3y
    markets:  # series_id -> CFTC contract code + report. Commodities live in the
      # Disaggregated report (party = Managed Money); financials are NOT in it —
      # they live in the TFF report (party = Leveraged Funds). Spec-gap fix 2026-07-18.
      cot_gold: {code: "088691", report: disagg}
      cot_wti: {code: "067651", report: disagg}
      cot_ust10y: {code: "043602", report: tff}
      cot_eur: {code: "099741", report: tff}
      cot_corn: {code: "002602", report: disagg}
    causal_sentence: Trend-chasing speculators are right mid-trend and wrong at turns, so their positioning extremes mark old crowded trends and their abandonment marks early zones.
    elite_watcher: Managed-futures desks (Man AHL, AQR), veteran COT analysts (Larry Williams)

  - series_id: spine_prices
    name: Daily closes for the 5 spine markets (GC, CL, ZN, EURUSD, ZC) feeding the 200-day momentum gate
    group: F
    source: Yahoo
    source_url: https://query1.finance.yahoo.com/v8/finance/chart/GC=F
    schedule: daily
    pub_lag_days: 0
    history_start: 2000-01-01
    window: sma200
    markets:  # series_id -> Yahoo symbol (stooq is JS-challenge-walled; decision 2026-07-18)
      price_gold: GC=F
      price_wti: CL=F
      price_ust10y: ZN=F
      price_eur: EURUSD=X
      price_corn: ZC=F
      price_wilshire: ^W5000  # weather gauge 2 numerator (FRED dropped WILL5000PR)
    causal_sentence: Investors underreact to news and then herd, so a price above its own 200-day average tends to keep drifting the same way.
    elite_watcher: Trend-following funds (AQR, Man AHL, Winton) running the century-validated strategy

  - series_id: real_yields
    name: 10-year TIPS real yield, FRED DFII10 (gold's engine + driver-alive correlation)
    group: H
    source: FRED
    source_url: https://fred.stlouisfed.org/graph/fredgraph.csv?id=DFII10
    schedule: daily
    pub_lag_days: 1
    history_start: 2003-01-02
    window: rolling10y
    series_codes: [DFII10]
    causal_sentence: Gold pays no interest, so when the real yield on safe bonds falls the penalty for holding gold disappears and its price rises.
    elite_watcher: Macro funds' gold desks (Bridgewater), World Gold Council research

  - series_id: oil_inventories
    name: US commercial crude oil stocks, EIA weekly (oil's engine)
    group: D
    source: EIA
    source_url: https://api.eia.gov/v2/seriesid/PET.WCESTUS1.W
    schedule: weekly
    pub_lag_days: 5  # week ends Friday, report lands the following Wednesday
    history_start: 1982-08-20
    window: same_week_5y_avg
    causal_sentence: Crude stocks below their seasonal norm mean demand is outrunning supply, which lifts oil prices before the shortage makes headlines.
    elite_watcher: Every oil trading desk (the weekly EIA report is oil's scheduled market-mover), Pierre Andurand
    series_codes: [PET.WCESTUS1.W]

  - series_id: market_valuation
    name: US market cap / GDP, the Buffett indicator (weather gauge 2 - GDP leg)
    group: F
    source: FRED
    source_url: https://fred.stlouisfed.org/graph/fredgraph.csv?id=GDP
    schedule: quarterly
    pub_lag_days: 120  # advance estimate lands ~4 months after the quarter's start date
    history_start: 1947-01-01
    window: rolling20y  # STANDING RULE: drifting series get rolling 20-yr, never all-history
    causal_sentence: When the whole stock market costs more than everything the country produces in a year, buyers are paying for hope, and hope-priced markets have less room to rise.
    elite_watcher: Warren Buffett (his stated favorite single measure), market strategists everywhere
    series_codes: [GDP]

  - series_id: credit_spread
    name: Corporate credit spread, Moody's Baa vs 10-yr Treasury (weather gauge 3)
    group: F
    source: FRED
    source_url: https://fred.stlouisfed.org/graph/fredgraph.csv?id=BAA10Y
    schedule: daily
    pub_lag_days: 1
    history_start: 1986-01-02
    window: rolling10y
    # BAA10Y = the working gauge (full history, uncapped). BAMLH0A0HYM2 (the
    # tech spec's HY OAS) is FRED-capped at ~3 trailing years (L-001) — it
    # keeps accumulating here so it can take over once its archive matures.
    series_codes: [BAA10Y, BAMLH0A0HYM2]
    causal_sentence: Credit investors demand extra yield the moment repayment looks shakier, so spreads widen before equity markets admit trouble.
    elite_watcher: Howard Marks (Oaktree), the Federal Reserve's financial-stability monitors
